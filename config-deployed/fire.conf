# put that code on /etc/nginx/sites-available/fire.conf then enter command like bellow code
# sudo ln -s /etc/nginx/sites-available/fire.conf /etc/nginx/sites-enabled/
# then you can run sudo certbot --nginx -d deursocial.com -d fire.deursocial.com

server {

        root /mainData/web;
        # Add index.php to the list if you are using PHP
        index index.html index.htm index.nginx-debian.html;

        server_name fire.deursocial.com;

        location / {
            proxy_pass http://127.0.0.1:3010;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
}
